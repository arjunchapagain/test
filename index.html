<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #0c0c0f;
      --card: rgba(255, 255, 255, 0.04);
      --card-border: rgba(255, 255, 255, 0.08);
      --fg: #f0ece4;
      --muted: #6b6a6a;
      --accent: #e8a634;
      --accent-hover: #f0b94d;
      --input-bg: rgba(255, 255, 255, 0.05);
      --input-border: rgba(255, 255, 255, 0.1);
      --input-focus: rgba(232, 166, 52, 0.4);
      --error: #e84c4c;
      --success: #34c77b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.35;
      pointer-events: none;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .blob--1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #e8a634 0%, transparent 70%);
      top: -15%; left: -10%;
      animation-duration: 20s;
    }
    .blob--2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #c44b2e 0%, transparent 70%);
      bottom: -20%; right: -8%;
      animation-duration: 24s;
      animation-delay: -6s;
    }
    .blob--3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #3a8f7a 0%, transparent 70%);
      top: 50%; left: 60%;
      animation-duration: 22s;
      animation-delay: -10s;
      opacity: 0.2;
    }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(40px, -30px) scale(1.08); }
      66%  { transform: translate(-20px, 50px) scale(0.95); }
      100% { transform: translate(30px, 20px) scale(1.05); }
    }

    /* Subtle grid pattern overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* Login card */
    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 48px 36px 40px;
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 30px 80px -20px rgba(0,0,0,0.6);
      animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Brand */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }
    .brand-icon {
      width: 40px; height: 40px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--bg);
      font-weight: 700;
      box-shadow: 0 4px 20px rgba(232, 166, 52, 0.3);
    }
    .brand-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.8px;
      margin-bottom: 6px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* Form fields */
    .field {
      margin-bottom: 20px;
      position: relative;
    }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--fg);
      margin-bottom: 8px;
      letter-spacing: 0.2px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap i.field-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--muted);
      transition: color 0.25s;
      pointer-events: none;
    }
    .input-wrap input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      background: var(--input-bg);
      border: 1.5px solid var(--input-border);
      border-radius: 11px;
      color: var(--fg);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }
    .input-wrap input::placeholder {
      color: var(--muted);
      opacity: 0.6;
    }
    .input-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--input-focus);
      background: rgba(255,255,255,0.07);
    }
    .input-wrap input:focus ~ i.field-icon {
      color: var(--accent);
    }
    .input-wrap input.error {
      border-color: var(--error);
      box-shadow: 0 0 0 3px rgba(232, 76, 76, 0.2);
    }
    .input-wrap input.success {
      border-color: var(--success);
      box-shadow: 0 0 0 3px rgba(52, 199, 123, 0.15);
    }

    /* Password toggle */
    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: var(--fg); }

    .field-msg {
      font-size: 12px;
      margin-top: 6px;
      min-height: 16px;
      transition: opacity 0.2s;
    }
    .field-msg.error { color: var(--error); }
    .field-msg.success { color: var(--success); }

    /* Row: remember + forgot */
    .options-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      font-size: 13px;
    }
    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: var(--muted);
      user-select: none;
      transition: color 0.2s;
    }
    .remember:hover { color: var(--fg); }
    .remember input { display: none; }
    .check-box {
      width: 18px; height: 18px;
      border: 1.5px solid var(--input-border);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .check-box i {
      font-size: 10px;
      color: var(--bg);
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.2s, transform 0.2s;
    }
    .remember input:checked + .check-box {
      background: var(--accent);
      border-color: var(--accent);
    }
    .remember input:checked + .check-box i {
      opacity: 1;
      transform: scale(1);
    }
    .forgot {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .forgot:hover { color: var(--accent-hover); }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 11px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.2px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.25s, transform 0.15s, box-shadow 0.25s;
      box-shadow: 0 4px 24px rgba(232, 166, 52, 0.25);
    }
    .btn-submit:hover {
      background: var(--accent-hover);
      box-shadow: 0 6px 32px rgba(232, 166, 52, 0.35);
      transform: translateY(-1px);
    }
    .btn-submit:active {
      transform: translateY(0) scale(0.985);
    }
    .btn-submit .spinner {
      display: none;
      width: 20px; height: 20px;
      border: 2.5px solid rgba(12,12,15,0.2);
      border-top-color: var(--bg);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    .btn-submit.loading .btn-text { display: none; }
    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading { pointer-events: none; opacity: 0.85; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Ripple effect */
    .btn-submit::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255,255,255,0.25) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.4s;
    }
    .btn-submit:active::after { opacity: 1; transition: opacity 0s; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 28px 0;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--input-border);
    }

    /* Social buttons */
    .social-row {
      display: flex;
      gap: 12px;
    }
    .btn-social {
      flex: 1;
      padding: 12px;
      background: var(--input-bg);
      border: 1.5px solid var(--input-border);
      border-radius: 11px;
      color: var(--fg);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }
    .btn-social span {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
    }
    .btn-social:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.18);
      transform: translateY(-1px);
    }
    .btn-social:active { transform: translateY(0) scale(0.98); }

    /* Footer */
    .card-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 13px;
      color: var(--muted);
    }
    .card-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .card-footer a:hover { color: var(--accent-hover); }

    /* Toast notification */
    .toast {
      position: fixed;
      top: 28px;
      right: 28px;
      z-index: 100;
      padding: 14px 22px;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      transform: translateX(120%);
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    .toast.show { transform: translateX(0); }
    .toast--success {
      background: #1a3a2a;
      border: 1px solid rgba(52, 199, 123, 0.3);
      color: var(--success);
    }
    .toast--error {
      background: #3a1a1a;
      border: 1px solid rgba(232, 76, 76, 0.3);
      color: var(--error);
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 2px; height: 2px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) scale(1); }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.1; }
      100% { opacity: 0; transform: translateY(-100vh) scale(0.3); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card { padding: 36px 24px 32px; }
      .title { font-size: 24px; }
      .social-row { flex-direction: column; }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .blob, .particle { animation: none !important; }
      .login-card { animation: none !important; }
      * { transition-duration: 0.01ms !important; }
    }

    /* Focus visible */
    *:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    input:focus-visible { outline: none; }
  </style>
</head>
<body>

  <!-- Background effects -->
  <div class="blob blob--1"></div>
  <div class="blob blob--2"></div>
  <div class="blob blob--3"></div>
  <div class="particles" id="particles"></div>

  <!-- Toast -->
  <div class="toast" id="toast" role="alert" aria-live="polite">
    <i class="fa-solid fa-circle-check"></i>
    <span id="toastMsg"></span>
  </div>

  <!-- Login card -->
  <main class="login-wrapper">
    <div class="login-card">
      <div class="brand">
        <div class="brand-icon">N</div>
        <div class="brand-name">Nexus</div>
      </div>

      <h1 class="title">Welcome back</h1>
      <p class="subtitle">Enter your credentials to access your account</p>

      <form id="loginForm" novalidate autocomplete="on">
        <!-- Email -->
        <div class="field">
          <label for="email">Email address</label>
          <div class="input-wrap">
            <i class="fa-regular fa-envelope field-icon"></i>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
              aria-describedby="emailMsg"
            >
          </div>
          <div class="field-msg" id="emailMsg"></div>
        </div>

        <!-- Password -->
        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock field-icon"></i>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
              aria-describedby="pwMsg"
            >
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
          <div class="field-msg" id="pwMsg"></div>
        </div>

        <!-- Options row -->
        <div class="options-row">
          <label class="remember">
            <input type="checkbox" name="remember">
            <span class="check-box"><i class="fa-solid fa-check"></i></span>
            Remember me
          </label>
          <a href="#" class="forgot" id="forgotLink">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-submit" id="submitBtn">
          <span class="btn-text">Sign in</span>
          <div class="spinner"></div>
        </button>
      </form>

      <div class="divider">or continue with</div>

      <div class="social-row">
        <button class="btn-social" aria-label="Sign in with Google" id="btnGoogle">
          <i class="fa-brands fa-google"></i>
          <span>Google</span>
        </button>
        <button class="btn-social" aria-label="Sign in with GitHub" id="btnGithub">
          <i class="fa-brands fa-github"></i>
          <span>GitHub</span>
        </button>
        <button class="btn-social" aria-label="Sign in with Apple" id="btnApple">
          <i class="fa-brands fa-apple"></i>
          <span>Apple</span>
        </button>
      </div>

      <div class="card-footer">
        Don't have an account? <a href="#" id="signupLink">Create one</a>
      </div>
    </div>
  </main>

  <script>
    // --- Floating particles ---
    (function initParticles() {
      const container = document.getElementById('particles');
      const count = 20;
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.bottom = '-4px';
        p.style.width = p.style.height = (1.5 + Math.random() * 2) + 'px';
        p.style.animationDuration = (8 + Math.random() * 16) + 's';
        p.style.animationDelay = (Math.random() * 12) + 's';
        p.style.opacity = '0';
        container.appendChild(p);
      }
    })();

    // --- DOM references ---
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const pwInput = document.getElementById('password');
    const emailMsg = document.getElementById('emailMsg');
    const pwMsg = document.getElementById('pwMsg');
    const togglePw = document.getElementById('togglePw');
    const submitBtn = document.getElementById('submitBtn');
    const toast = document.getElementById('toast');
    const toastMsg = document.getElementById('toastMsg');

    // --- Toast ---
    let toastTimer = null;
    function showToast(message, type) {
      clearTimeout(toastTimer);
      toast.className = 'toast toast--' + type;
      toast.querySelector('i').className = type === 'success'
        ? 'fa-solid fa-circle-check'
        : 'fa-solid fa-circle-xmark';
      toastMsg.textContent = message;
      // Force reflow for re-trigger
      void toast.offsetWidth;
      toast.classList.add('show');
      toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);
    }

    // --- Toggle password visibility ---
    togglePw.addEventListener('click', () => {
      const isPassword = pwInput.type === 'password';
      pwInput.type = isPassword ? 'text' : 'password';
      togglePw.querySelector('i').className = isPassword
        ? 'fa-regular fa-eye-slash'
        : 'fa-regular fa-eye';
    });

    // --- Validation helpers ---
    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function setFieldState(input, msgEl, state, message) {
      input.classList.remove('error', 'success');
      msgEl.classList.remove('error', 'success');
      if (state) {
        input.classList.add(state);
        msgEl.classList.add(state);
      }
      msgEl.textContent = message || '';
    }

    // --- Real-time validation on blur ---
    emailInput.addEventListener('blur', () => {
      const val = emailInput.value.trim();
      if (!val) {
        setFieldState(emailInput, emailMsg, 'error', 'Email is required');
      } else if (!isValidEmail(val)) {
        setFieldState(emailInput, emailMsg, 'error', 'Please enter a valid email');
      } else {
        setFieldState(emailInput, emailMsg, 'success', '');
      }
    });

    emailInput.addEventListener('input', () => {
      if (emailInput.classList.contains('error')) {
        const val = emailInput.value.trim();
        if (isValidEmail(val)) setFieldState(emailInput, emailMsg, 'success', '');
      }
    });

    pwInput.addEventListener('blur', () => {
      const val = pwInput.value;
      if (!val) {
        setFieldState(pwInput, pwMsg, 'error', 'Password is required');
      } else if (val.length < 6) {
        setFieldState(pwInput, pwMsg, 'error', 'Must be at least 6 characters');
      } else {
        setFieldState(pwInput, pwMsg, 'success', '');
      }
    });

    pwInput.addEventListener('input', () => {
      if (pwInput.classList.contains('error') && pwInput.value.length >= 6) {
        setFieldState(pwInput, pwMsg, 'success', '');
      }
    });

    // --- Form submit ---
    form.addEventListener('submit', (e) => {
      e.preventDefault();

      let valid = true;
      const email = emailInput.value.trim();
      const password = pwInput.value;

      // Validate email
      if (!email) {
        setFieldState(emailInput, emailMsg, 'error', 'Email is required');
        valid = false;
      } else if (!isValidEmail(email)) {
        setFieldState(emailInput, emailMsg, 'error', 'Please enter a valid email');
        valid = false;
      } else {
        setFieldState(emailInput, emailMsg, 'success', '');
      }

      // Validate password
      if (!password) {
        setFieldState(pwInput, pwMsg, 'error', 'Password is required');
        valid = false;
      } else if (password.length < 6) {
        setFieldState(pwInput, pwMsg, 'error', 'Must be at least 6 characters');
        valid = false;
      } else {
        setFieldState(pwInput, pwMsg, 'success', '');
      }

      if (!valid) return;

      // Simulate loading
      submitBtn.classList.add('loading');

      setTimeout(() => {
        submitBtn.classList.remove('loading');
        // Demo: accept any valid input
        showToast('Signed in successfully', 'success');
        form.reset();
        setFieldState(emailInput, emailMsg, '', '');
        setFieldState(pwInput, pwMsg, '', '');
      }, 1800);
    });

    // --- Button ripple tracking ---
    submitBtn.addEventListener('mousemove', (e) => {
      const rect = submitBtn.getBoundingClientRect();
      submitBtn.style.setProperty('--x', ((e.clientX - rect.left) / rect.width * 100) + '%');
      submitBtn.style.setProperty('--y', ((e.clientY - rect.top) / rect.height * 100) + '%');
    });

    // --- Social & link handlers ---
    document.getElementById('btnGoogle').addEventListener('click', () => showToast('Google sign-in initiated', 'success'));
    document.getElementById('btnGithub').addEventListener('click', () => showToast('GitHub sign-in initiated', 'success'));
    document.getElementById('btnApple').addEventListener('click', () => showToast('Apple sign-in initiated', 'success'));
    document.getElementById('forgotLink').addEventListener('click', (e) => {
      e.preventDefault();
      showToast('Password reset link sent to your email', 'success');
    });
    document.getElementById('signupLink').addEventListener('click', (e) => {
      e.preventDefault();
      showToast('Redirecting to sign up...', 'success');
    });
  </script>
</body>
</html>
